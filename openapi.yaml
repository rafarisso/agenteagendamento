openapi: 3.0.1
info:
  title: SENAI Agenda IA API
  version: 3.0.0
  description: API didática para uso no Microsoft Foundry. Primeiro consulte disponibilidade, depois sugira horários ao usuário e crie o agendamento somente após confirmação.
servers:
  - url: https://agente-agendamento.netlify.app
paths:
  /api/disponibilidade:
    get:
      operationId: listarDisponibilidade
      summary: Lista a disponibilidade de uma data
      description: Retorna todos os horários didáticos de uma data e indica quais estão disponíveis.
      parameters:
        - name: data
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-05-15"
      responses:
        "200":
          description: Disponibilidade da data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListarDisponibilidadeResponse"
        "400":
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /api/consultar-disponibilidade:
    post:
      operationId: consultarDisponibilidade
      summary: Consulta horários disponíveis por período
      description: Use antes de criar agendamento. Retorna horários disponíveis para data, serviço e período.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultarDisponibilidadeRequest"
            examples:
              tarde:
                value:
                  data: "2026-05-15"
                  servico: Hidratação
                  periodo: tarde
      responses:
        "200":
          description: Horários disponíveis para sugestão ao usuário.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultarDisponibilidadeResponse"
        "400":
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /api/criar-agendamento:
    post:
      operationId: criarAgendamento
      summary: Cria um agendamento
      description: Cria uma nova solicitação de agendamento no Supabase. Chame apenas depois de consultar disponibilidade e receber confirmação do usuário.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarAgendamentoRequest"
            examples:
              chat:
                value:
                  nome: Juliana Alves
                  whatsapp: "11988887777"
                  servico: Hidratação
                  data: "2026-05-15"
                  horario: "15:30"
                  observacoes: Cliente prefere atendimento no período da tarde
                  origem: chat
      responses:
        "201":
          description: Agendamento registrado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriarAgendamentoResponse"
        "400":
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Horário já ocupado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
components:
  schemas:
    SlotDisponibilidade:
      type: object
      required:
        - horario
        - disponivel
      properties:
        horario:
          type: string
          example: "14:00"
        periodo:
          type: string
          enum:
            - manha
            - tarde
          example: tarde
        disponivel:
          type: boolean
          example: true
    ListarDisponibilidadeResponse:
      type: object
      required:
        - success
        - data
        - slots
      properties:
        success:
          type: boolean
          example: true
        data:
          type: string
          format: date
          example: "2026-05-15"
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotDisponibilidade"
    ConsultarDisponibilidadeRequest:
      type: object
      additionalProperties: false
      required:
        - data
        - servico
        - periodo
      properties:
        data:
          type: string
          format: date
          example: "2026-05-15"
        servico:
          type: string
          example: Hidratação
        periodo:
          type: string
          enum:
            - manha
            - tarde
          example: tarde
    ConsultarDisponibilidadeResponse:
      type: object
      required:
        - success
        - horariosDisponiveis
        - mensagem
      properties:
        success:
          type: boolean
          example: true
        data:
          type: string
          format: date
          example: "2026-05-15"
        servico:
          type: string
          example: Hidratação
        periodo:
          type: string
          example: tarde
        horariosDisponiveis:
          type: array
          items:
            type: string
          example:
            - "14:00"
            - "15:30"
            - "16:30"
        mensagem:
          type: string
          example: Encontrei 3 horários disponíveis para esse período.
    CriarAgendamentoRequest:
      type: object
      additionalProperties: false
      required:
        - nome
        - whatsapp
        - servico
        - data
        - horario
      properties:
        nome:
          type: string
          minLength: 3
          example: Juliana Alves
        whatsapp:
          type: string
          minLength: 8
          example: "11988887777"
        servico:
          type: string
          example: Hidratação
        data:
          type: string
          format: date
          example: "2026-05-15"
        horario:
          type: string
          example: "15:30"
        observacoes:
          type: string
          maxLength: 1000
          example: Cliente prefere atendimento no período da tarde
        origem:
          type: string
          enum:
            - chat
            - manual
            - foundry
            - teste
          example: foundry
    CriarAgendamentoResponse:
      type: object
      required:
        - success
        - id
        - message
        - status
        - data
      properties:
        success:
          type: boolean
          example: true
        id:
          type: string
          format: uuid
        message:
          type: string
          example: Agendamento registrado com sucesso
        status:
          type: string
          enum:
            - pendente
            - confirmado
            - cancelado
          example: pendente
        data:
          type: object
    Erro:
      type: object
      required:
        - error
      properties:
        error:
          type: string
