openapi: 3.0.1
info:
  title: SENAI Agenda IA API
  version: 2.0.0
  description: Cria uma nova solicitação de agendamento no projeto SENAI Agenda IA.
servers:
  - url: https://agente-agendamento.netlify.app
paths:
  /api/criar-agendamento:
    post:
      operationId: criarAgendamento
      summary: Cria uma nova solicitação de agendamento
      description: Cria uma nova solicitação de agendamento no projeto SENAI Agenda IA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarAgendamentoRequest"
            examples:
              salao:
                summary: Caso de uso demonstrativo para salão de beleza
                value:
                  nome: Juliana Alves
                  whatsapp: "11988887777"
                  servico: Hidratacao
                  data: "2026-05-15"
                  horario: "15:00"
                  observacoes: Cliente prefere atendimento com profissional feminina
      responses:
        "201":
          description: Agendamento registrado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriarAgendamentoResponse"
        "400":
          description: Dados invalidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Horario ja reservado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "500":
          description: Variaveis de ambiente ausentes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: Falha ao persistir no Supabase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
components:
  schemas:
    CriarAgendamentoRequest:
      type: object
      additionalProperties: false
      required:
        - nome
        - whatsapp
        - servico
        - data
        - horario
      properties:
        nome:
          type: string
          minLength: 3
          example: Juliana Alves
        whatsapp:
          type: string
          minLength: 8
          example: "11988887777"
        servico:
          type: string
          enum:
            - Corte masculino
            - Hidratacao
            - Escova
            - Coloracao
            - Diagnostico Foundry
            - Automacao com Agentes
            - Integracao Supabase
            - Mentoria tecnica
        data:
          type: string
          format: date
          example: "2026-05-15"
        horario:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          example: "15:00"
        observacoes:
          type: string
          maxLength: 1000
          example: Cliente prefere atendimento com profissional feminina
    CriarAgendamentoResponse:
      type: object
      required:
        - success
        - message
        - status
        - data
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Agendamento registrado com sucesso
        status:
          type: string
          enum:
            - pendente
            - confirmado
            - cancelado
            - concluido
          example: pendente
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
            whatsapp:
              type: string
            servico:
              type: string
            data:
              type: string
              format: date
            horario:
              type: string
            observacoes:
              type: string
              nullable: true
    Erro:
      type: object
      required:
        - error
      properties:
        error:
          type: string
