openapi: 3.0.1
info:
  title: API de Agendamento Foundry
  version: 1.0.0
  description: API publica para criar agendamentos por meio de uma Netlify Function.
servers:
  - url: https://agente-agendamento.netlify.app
paths:
  /api/criar-agendamento:
    post:
      operationId: criarAgendamento
      summary: Cria um novo agendamento
      description: Registra um pedido de agendamento e retorna o protocolo criado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarAgendamentoRequest"
            examples:
              exemplo:
                value:
                  nome: Rafael Risso
                  email: contato@example.com
                  telefone: "(11) 99999-9999"
                  servico: Diagnostico Foundry
                  data: "2026-05-20"
                  horario: "09:00"
                  mensagem: Quero avaliar uma automacao com agentes.
      responses:
        "201":
          description: Agendamento criado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriarAgendamentoResponse"
        "400":
          description: Dados invalidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "500":
          description: Variaveis de ambiente ausentes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Horario ja reservado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: Falha ao persistir no Supabase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
components:
  schemas:
    CriarAgendamentoRequest:
      type: object
      additionalProperties: false
      required:
        - nome
        - email
        - telefone
        - servico
        - data
        - horario
      properties:
        nome:
          type: string
          minLength: 3
          example: Rafael Risso
        email:
          type: string
          format: email
          example: contato@example.com
        telefone:
          type: string
          minLength: 8
          example: "(11) 99999-9999"
        servico:
          type: string
          enum:
            - Diagnostico Foundry
            - Automacao com Agentes
            - Integracao Supabase
            - Mentoria tecnica
        data:
          type: string
          format: date
          example: "2026-05-20"
        horario:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          example: "09:00"
        mensagem:
          type: string
          maxLength: 1000
          example: Quero avaliar uma automacao com agentes.
    CriarAgendamentoResponse:
      type: object
      required:
        - id
        - status
        - message
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pendente
            - confirmado
            - cancelado
            - concluido
        message:
          type: string
    Erro:
      type: object
      required:
        - error
      properties:
        error:
          type: string
