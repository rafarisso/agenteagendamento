openapi: 3.0.1
info:
  title: SENAI Agenda IA API
  version: 2.1.0
  description: API didática do projeto SENAI Agenda IA para consultar disponibilidade e criar solicitações de agendamento.
servers:
  - url: https://agente-agendamento.netlify.app
paths:
  /api/consultar-disponibilidade:
    post:
      operationId: consultarDisponibilidade
      summary: Consulta disponibilidade de uma data e horário
      description: Verifica se uma data e um horário estão livres antes de criar uma solicitação de agendamento no projeto SENAI Agenda IA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultarDisponibilidadeRequest"
            examples:
              consulta:
                summary: Consulta de horário
                value:
                  data: "2026-05-15"
                  horario: "14:00"
      responses:
        "200":
          description: Resultado da consulta de disponibilidade.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultarDisponibilidadeResponse"
        "400":
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: Falha ao consultar o Supabase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
  /api/criar-agendamento:
    post:
      operationId: criarAgendamento
      summary: Cria uma nova solicitação de agendamento
      description: Cria uma nova solicitação de agendamento no projeto SENAI Agenda IA.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriarAgendamentoRequest"
            examples:
              salao:
                summary: Caso de uso demonstrativo para salão de beleza
                value:
                  nome: Juliana Alves
                  whatsapp: "11988887777"
                  servico: Hidratação
                  data: "2026-05-15"
                  horario: "15:00"
                  observacoes: Cliente prefere atendimento com profissional feminina
      responses:
        "201":
          description: Agendamento registrado com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriarAgendamentoResponse"
        "400":
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Horário já reservado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "500":
          description: Variáveis de ambiente ausentes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "502":
          description: Falha ao persistir no Supabase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
components:
  schemas:
    ConsultarDisponibilidadeRequest:
      type: object
      additionalProperties: false
      required:
        - data
        - horario
      properties:
        data:
          type: string
          format: date
          example: "2026-05-15"
        horario:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          example: "14:00"
    ConsultarDisponibilidadeResponse:
      type: object
      required:
        - success
        - disponivel
        - message
        - data
        - horario
      properties:
        success:
          type: boolean
          example: true
        disponivel:
          type: boolean
          example: true
        message:
          type: string
          example: Horário disponível para agendamento.
        data:
          type: string
          format: date
          example: "2026-05-15"
        horario:
          type: string
          example: "14:00"
        conflito:
          type: object
          nullable: true
          properties:
            status:
              type: string
              example: pendente
            servico:
              type: string
              example: Hidratação
    CriarAgendamentoRequest:
      type: object
      additionalProperties: false
      required:
        - nome
        - whatsapp
        - servico
        - data
        - horario
      properties:
        nome:
          type: string
          minLength: 3
          example: Juliana Alves
        whatsapp:
          type: string
          minLength: 8
          example: "11988887777"
        servico:
          type: string
          enum:
            - Corte masculino
            - Hidratação
            - Escova
            - Coloração
            - Diagnóstico Foundry
            - Automação com Agentes
            - Integração Supabase
            - Mentoria técnica
          example: Hidratação
        data:
          type: string
          format: date
          example: "2026-05-15"
        horario:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          example: "15:00"
        observacoes:
          type: string
          maxLength: 1000
          example: Cliente prefere atendimento com profissional feminina
    CriarAgendamentoResponse:
      type: object
      required:
        - success
        - message
        - status
        - data
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Agendamento registrado com sucesso
        status:
          type: string
          enum:
            - pendente
            - confirmado
            - cancelado
            - concluido
          example: pendente
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
            whatsapp:
              type: string
            servico:
              type: string
              example: Hidratação
            data:
              type: string
              format: date
            horario:
              type: string
            observacoes:
              type: string
              nullable: true
    Erro:
      type: object
      required:
        - error
      properties:
        error:
          type: string
