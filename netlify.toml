[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[[redirects]]
  from = "/api/criar-agendamento"
  to = "/.netlify/functions/criar-agendamento"
  status = 200
  force = true

[[redirects]]
  from = "/api/listar-agendamentos"
  to = "/.netlify/functions/listar-agendamentos"
  status = 200
  force = true

[[redirects]]
  from = "/api/consultar-disponibilidade"
  to = "/.netlify/functions/consultar-disponibilidade"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
